<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Bot SaaS — Acceso</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #075e54, #128c7e);
      padding: 32px 24px;
      text-align: center;
      color: white;
    }
    .header .logo {
      font-size: 48px;
      margin-bottom: 8px;
    }
    .header h1 {
      font-size: 1.4em;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .header p {
      opacity: 0.85;
      font-size: 0.9em;
    }
    .body {
      padding: 28px 24px;
    }
    .tab-bar {
      display: flex;
      background: #f0f2f5;
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95em;
      font-weight: 500;
      color: #666;
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: #fff;
      color: #075e54;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.85em;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95em;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #128c7e; }
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #075e54, #128c7e);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.9em;
      text-align: center;
      display: none;
    }
    .msg.error { background: #fdecea; color: #c0392b; display: block; }
    .msg.info { background: #e8f5e9; color: #2e7d32; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">💬</div>
      <h1>WhatsApp Bot SaaS</h1>
      <p>Gestiona tu bot de WhatsApp con facilidad</p>
    </div>
    <div class="body">
      <div class="tab-bar">
        <button class="tab-btn active" id="loginTab">Iniciar Sesión</button>
        <button class="tab-btn" id="registerTab">Registrarse</button>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="loginEmail" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="loginPassword" placeholder="Tu contraseña" required>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Entrar</button>
      </form>

      <form id="registerForm" style="display:none;">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="regFullName" placeholder="Juan García" required>
        </div>
        <div class="form-group">
          <label>Número de WhatsApp (sin +)</label>
          <input type="tel" id="regPhone" placeholder="5359190241" required>
        </div>
        <div class="form-group">
          <label>Correo electrónico</label>
          <input type="email" id="regEmail" placeholder="correo@ejemplo.com" required>
        </div>
        <div class="form-group">
          <label>Contraseña (mínimo 6 caracteres)</label>
          <input type="password" id="regPassword" placeholder="Contraseña segura" required>
        </div>
        <button type="submit" class="btn-primary" id="registerBtn">Crear cuenta</button>
      </form>

      <div id="msgBox" class="msg"></div>
    </div>
  </div>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    if (window.location.hash === '#clear') {
      localStorage.clear();
      window.location.href = '/login.html';
    }

    const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

    function showMsg(text, type) {
      const el = document.getElementById('msgBox');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function checkSession() {
      const token = localStorage.getItem('sb-token');
      if (!token) return;
      showMsg('Verificando sesión...', 'info');
      try {
        const { data: { user }, error } = await supabase.auth.getUser(token);
        if (error || !user) { localStorage.removeItem('sb-token'); document.getElementById('msgBox').className = 'msg'; return; }
        const res = await fetch('/api/user/profile', { headers: { 'Authorization': `Bearer ${token}` } });
        if (res.ok) {
          const p = await res.json();
          window.location.href = p.is_admin ? '/admin.html' : '/user.html';
        } else {
          localStorage.removeItem('sb-token');
          document.getElementById('msgBox').className = 'msg';
        }
      } catch (e) {
        localStorage.removeItem('sb-token');
        document.getElementById('msgBox').className = 'msg';
      }
    }
    checkSession();

    document.getElementById('loginTab').onclick = () => {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('loginTab').classList.add('active');
      document.getElementById('registerTab').classList.remove('active');
      document.getElementById('msgBox').className = 'msg';
    };
    document.getElementById('registerTab').onclick = () => {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('registerTab').classList.add('active');
      document.getElementById('loginTab').classList.remove('active');
      document.getElementById('msgBox').className = 'msg';
    };

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Entrando...';
      showMsg('', '');
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) { showMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Entrar'; return; }
      localStorage.setItem('sb-token', data.session.access_token);
      try {
        const res = await fetch('/api/user/profile', { headers: { 'Authorization': `Bearer ${data.session.access_token}` } });
        const p = await res.json();
        window.location.href = p.is_admin ? '/admin.html' : '/user.html';
      } catch { window.location.href = '/user.html'; }
    };

    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      btn.disabled = true; btn.textContent = 'Registrando...';
      showMsg('', '');
      const fullName = document.getElementById('regFullName').value;
      const phone = document.getElementById('regPhone').value.replace(/\D/g, '');
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      if (phone.length < 7) { showMsg('Número inválido', 'error'); btn.disabled = false; btn.textContent = 'Crear cuenta'; return; }
      const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: fullName, phone_number: phone } } });
      if (error) { showMsg(error.message, 'error'); btn.disabled = false; btn.textContent = 'Crear cuenta'; return; }
      showMsg('✅ Registro exitoso. Tu cuenta está pendiente de aprobación por el administrador.', 'info');
      btn.disabled = false; btn.textContent = 'Crear cuenta';
      document.getElementById('loginTab').click();
    };
  </script>
</body>
</html>
