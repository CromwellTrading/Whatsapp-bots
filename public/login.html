<!DOCTYPE html>
<html>
<head>
  <title>Login - WhatsApp Bot SaaS</title>
  <style>
    body { font-family: Arial; max-width: 400px; margin: 50px auto; padding: 20px; }
    input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; }
    button { padding: 12px 20px; width: 100%; margin: 5px 0; cursor: pointer; }
    .tab { display: flex; margin-bottom: 20px; }
    .tab button { flex:1; background: #f0f0f0; border: none; }
    .tab button.active { background: #007bff; color: white; }
    .form-container { border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
    .error { color: red; margin-top: 10px; }
  </style>
</head>
<body>
  <h1 style="text-align:center;">🤖 WhatsApp Bot SaaS</h1>
  <div class="tab">
    <button id="loginTab" class="active">Iniciar Sesión</button>
    <button id="registerTab">Registrarse</button>
  </div>
  
  <div class="form-container">
    <form id="loginForm">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Contraseña" required>
      <button type="submit">Entrar</button>
    </form>
    
    <form id="registerForm" style="display:none;">
      <h2>Registro</h2>
      <input type="text" id="regFullName" placeholder="Nombre completo" required>
      <input type="tel" id="regPhone" placeholder="Número (ej: 5359190241)" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Contraseña (mín 6)" required>
      <button type="submit">Registrarse</button>
    </form>
    <div id="errorMsg" class="error"></div>
  </div>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
    function showError(msg) {
      document.getElementById('errorMsg').textContent = msg;
    }
    
    if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
      showError('Error de configuración. Contacte al administrador.');
      throw new Error('Config missing');
    }
    
    const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    
    document.getElementById('loginTab').onclick = () => {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('loginTab').classList.add('active');
      document.getElementById('registerTab').classList.remove('active');
    };
    document.getElementById('registerTab').onclick = () => {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'block';
      document.getElementById('registerTab').classList.add('active');
      document.getElementById('loginTab').classList.remove('active');
    };
    
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      showError('');
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return showError(error.message);
      
      localStorage.setItem('sb-token', data.session.access_token);
      
      const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', data.user.id).single();
      window.location.href = profile?.is_admin ? '/admin.html' : '/user.html';
    };
    
    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      showError('');
      const fullName = document.getElementById('regFullName').value;
      const phone = document.getElementById('regPhone').value.replace(/\D/g, '');
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      
      if (phone.length < 7) return showError('Número inválido');
      
      const { error } = await supabase.auth.signUp({
        email,
        password,
        options: { data: { full_name: fullName, phone_number: phone } }
      });
      if (error) return showError(error.message);
      
      alert('✅ Registro exitoso. Tu cuenta está pendiente de aprobación.');
      document.getElementById('loginTab').click();
    };
    
    // Redirigir si ya hay sesión
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', session.user.id).single();
        window.location.href = profile?.is_admin ? '/admin.html' : '/user.html';
      }
    })();
  </script>
</body>
</html>
