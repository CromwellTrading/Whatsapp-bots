<!DOCTYPE html>
<html>
<head>
  <title>Mi Panel - WhatsApp Bot</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; max-width: 1200px; margin: 20px auto; padding: 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 20px; margin: 20px 0; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; }
    #logout { float: right; }
    textarea { width: 100%; }
    .error { color: red; background: #f8d7da; padding: 10px; border-radius: 5px; }
    #loading { text-align: center; padding: 50px; }
    .tab-bar { display: flex; border-bottom: 1px solid #ccc; margin-bottom: 20px; }
    .tab { padding: 10px 20px; cursor: pointer; background: #f0f0f0; border: none; }
    .tab.active { background: #007bff; color: white; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f2f2f2; }
    .media-preview { max-width: 100px; max-height: 100px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
    .modal-content { background: white; max-width: 500px; margin: 50px auto; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <div id="loading">⏳ Cargando panel...</div>

  <div id="mainPanel" style="display:none;">
    <button id="logout">Cerrar Sesión</button>
    <h1>🤖 Mi Panel de Control</h1>

    <div class="tab-bar">
      <button class="tab active" data-tab="status">Estado</button>
      <button class="tab" data-tab="groups">Grupos</button>
      <button class="tab" data-tab="tasks">Tareas</button>
      <button class="tab" data-tab="status-tasks">Estados</button>
      <button class="tab" data-tab="autoreply">Auto-Reply</button>
    </div>

    <!-- Estado -->
    <div id="tab-status" class="tab-content active">
      <div class="card">
        <h2>📡 Estado de Conexión</h2>
        <p>Estado: <span id="statusText">Cargando...</span></p>
        <p>Número vinculado: <strong><span id="phoneDisplay"></span></strong></p>
        
        <button id="requestPairingBtn" style="background:#25D366; color:white; font-weight:bold; padding:10px 20px;">
          📱 Solicitar código de vinculación
        </button>
        
        <div id="qrContainer" style="text-align:center; margin:15px 0;"></div>
        <div id="codeContainer" style="font-size:1.3em; margin:10px 0; padding:10px; background:#f0f0f0; border-radius:5px;"></div>
        
        <button id="refreshStatus">🔄 Actualizar</button>
        <button id="restartBot">⚠️ Reiniciar Conexión</button>
        <button id="clearSessionBtn" style="background:#dc3545; color:white;">🧹 Limpiar sesión</button>
      </div>
    </div>

    <!-- Grupos -->
    <div id="tab-groups" class="tab-content">
      <div class="card">
        <h2>👥 Grupos</h2>
        <button id="loadGroups">🔄 Cargar grupos</button>
        <div id="groupsList"></div>
      </div>
    </div>

    <!-- Tareas -->
    <div id="tab-tasks" class="tab-content">
      <div class="card">
        <h2>📋 Tareas Programadas</h2>
        <button id="newTaskBtn">➕ Nueva Tarea</button>
        <table id="tasksTable">
          <thead><tr><th>Nombre</th><th>Destino</th><th>Tipo</th><th>Programación</th><th>Activa</th><th>Acciones</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Estados -->
    <div id="tab-status-tasks" class="tab-content">
      <div class="card">
        <h2>📱 Estados Programados</h2>
        <button id="newStatusTaskBtn">➕ Nuevo Estado</button>
        <table id="statusTasksTable">
          <thead><tr><th>Nombre</th><th>Mensaje</th><th>Tipo</th><th>Programación</th><th>Activa</th><th>Acciones</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Auto-Reply -->
    <div id="tab-autoreply" class="tab-content">
      <div class="card">
        <h2>💬 Auto-Reply</h2>
        <label><input type="checkbox" id="autoReplyActive"> Activar respuesta automática</label><br><br>
        <label>Mensaje:<br><textarea id="autoReplyText" rows="3"></textarea></label><br><br>
        <label>Imagen (opcional): <input type="file" id="autoReplyImage" accept="image/*"></label><br>
        <img id="autoReplyPreview" class="media-preview" style="display:none;"><br>
        <label>Hora inicio (0-23): <input type="number" id="startHour" min="0" max="23"></label>
        <label>Hora fin (0-23): <input type="number" id="endHour" min="0" max="23"></label><br><br>
        <button id="saveSettings">💾 Guardar Configuración</button>
      </div>
    </div>

    <div id="errorMessage" class="error" style="display:none;"></div>
  </div>

  <!-- Modal Tarea/Estado -->
  <div id="taskModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Nueva Tarea</h3>
      <form id="taskForm">
        <input type="hidden" id="taskId">
        <input type="hidden" id="taskType" value="task">
        <label>Nombre: <input type="text" id="taskName" required></label><br>
        <div id="targetSection">
          <label>Destino: 
            <select id="taskTargetType">
              <option value="private">Privado (número)</option>
              <option value="group">Grupo</option>
            </select>
          </label><br>
          <div id="privateTargetDiv">
            <label>Número (sin +): <input type="tel" id="taskPrivateNumber" placeholder="5359190241"></label>
          </div>
          <div id="groupTargetDiv" style="display:none;">
            <label>Grupo: <select id="taskGroupSelect"></select></label>
          </div>
        </div>
        <label>Mensaje: <textarea id="taskMessage" rows="3"></textarea></label><br>
        <label>Imagen (opcional): <input type="file" id="taskImage" accept="image/*"></label><br>
        <img id="taskImagePreview" class="media-preview" style="display:none;"><br>
        <label>Tipo de programación:
          <select id="taskScheduleType">
            <option value="cron">Hora específica (diaria)</option>
            <option value="interval">Intervalo (minutos)</option>
          </select>
        </label><br>
        <div id="cronDiv">
          <label>Hora (0-23): <input type="number" id="taskHour" min="0" max="23"></label>
          <label>Minuto: <input type="number" id="taskMinute" min="0" max="59"></label>
        </div>
        <div id="intervalDiv" style="display:none;">
          <label>Minutos: <input type="number" id="taskInterval" min="1" value="60"></label>
        </div>
        <label><input type="checkbox" id="taskActive"> Activa</label><br>
        <button type="submit">Guardar</button>
        <button type="button" id="cancelModal">Cancelar</button>
      </form>
    </div>
  </div>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    let token = localStorage.getItem('sb-token');
    let currentProfile = null;
    let groupsCache = [];
    let manualPairingCode = null;

    function showError(msg) {
      const el = document.getElementById('errorMessage');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }

    async function apiCall(endpoint, method='GET', body=null) {
      const res = await fetch(`/api/user${endpoint}`, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: body ? JSON.stringify(body) : null
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'Error en la solicitud');
      }
      return res;
    }

    async function uploadImage(file) {
      const formData = new FormData();
      formData.append('image', file);
      const res = await fetch('/api/user/upload', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      if (!res.ok) throw new Error('Error al subir imagen');
      const data = await res.json();
      return data.url;
    }

    async function main() {
      const loadingDiv = document.getElementById('loading');
      try {
        if (!token) throw new Error('No hay sesión');
        
        const { data: { user }, error } = await supabase.auth.getUser(token);
        if (error || !user) throw new Error('Sesión inválida');
        
        const profileRes = await fetch('/api/user/profile', { headers: { 'Authorization': `Bearer ${token}` } });
        if (!profileRes.ok) throw new Error('Perfil no encontrado');
        currentProfile = await profileRes.json();
        
        if (!currentProfile.is_approved) {
          loadingDiv.style.display = 'none';
          document.body.innerHTML = `<div style="max-width:600px;margin:50px auto;text-align:center"><h1>⏳ Cuenta pendiente de aprobación</h1><button id="logoutPending">Cerrar Sesión</button></div>`;
          document.getElementById('logoutPending').onclick = () => { localStorage.removeItem('sb-token'); location.href='/login.html'; };
          return;
        }
        
        if (currentProfile.is_admin) {
          const adminLink = document.createElement('div');
          adminLink.innerHTML = '<p>🔧 <a href="/admin.html">Ir al panel de administración</a></p>';
          document.getElementById('mainPanel').insertBefore(adminLink, document.getElementById('mainPanel').firstChild);
        }
        
        loadingDiv.style.display = 'none';
        document.getElementById('mainPanel').style.display = 'block';
        document.getElementById('phoneDisplay').textContent = currentProfile.phone_number || 'No definido';
        
        setupEventListeners();
        await loadStatus();
        await loadSettings();
        setInterval(loadStatus, 30000);
      } catch (error) {
        loadingDiv.innerHTML = `❌ ${error.message}<br>Redirigiendo...`;
        localStorage.removeItem('sb-token');
        setTimeout(() => location.href='/login.html', 2000);
      }
    }

    function setupEventListeners() {
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
          if (tab.dataset.tab === 'groups') loadGroupsList();
          if (tab.dataset.tab === 'tasks') loadTasks();
          if (tab.dataset.tab === 'status-tasks') loadStatusTasks();
        });
      });
      
      document.getElementById('logout').onclick = () => {
        localStorage.removeItem('sb-token');
        location.href = '/login.html';
      };
      document.getElementById('refreshStatus').onclick = loadStatus;
      document.getElementById('restartBot').onclick = restartBot;
      document.getElementById('clearSessionBtn').onclick = clearSession;
      document.getElementById('requestPairingBtn').onclick = requestPairingCode;
      document.getElementById('saveSettings').onclick = saveAutoReply;
      document.getElementById('loadGroups').onclick = loadGroupsList;
      document.getElementById('newTaskBtn').onclick = () => openTaskModal();
      document.getElementById('newStatusTaskBtn').onclick = () => openTaskModal('status');
      document.getElementById('cancelModal').onclick = closeModal;
      document.getElementById('taskForm').onsubmit = saveTask;
      
      document.getElementById('taskTargetType').onchange = toggleTargetType;
      document.getElementById('taskScheduleType').onchange = toggleScheduleType;
      document.getElementById('taskImage').onchange = previewTaskImage;
      document.getElementById('autoReplyImage').onchange = previewAutoReplyImage;
    }

    async function loadStatus() {
      try {
        const res = await apiCall('/status');
        const data = await res.json();
        const statusEl = document.getElementById('statusText');

        if (data.connected) {
          statusEl.textContent = '🟢 Conectado';
          document.getElementById('requestPairingBtn').style.display = 'none';
          document.getElementById('qrContainer').innerHTML = '';
          document.getElementById('codeContainer').innerHTML = '';
        } else if (data.qrAvailable) {
          statusEl.textContent = '🟡 Esperando escaneo QR';
          document.getElementById('requestPairingBtn').style.display = 'inline-block';
          document.getElementById('qrContainer').innerHTML = '<img src="/api/user/qr" alt="QR Code" style="max-width:250px; border:1px solid #ccc; padding:5px;"/>';
          if (!document.getElementById('codeContainer').innerHTML.includes('Código')) {
            document.getElementById('codeContainer').innerHTML = '';
          }
        } else if (data.pairingCode || manualPairingCode) {
          statusEl.textContent = '🟡 Esperando vinculación';
          document.getElementById('requestPairingBtn').style.display = 'inline-block';
          document.getElementById('qrContainer').innerHTML = '';
          const code = data.pairingCode || manualPairingCode;
          if (code && !document.getElementById('codeContainer').innerHTML.includes('Código')) {
            document.getElementById('codeContainer').innerHTML = `
              <p>🔢 Código de 8 dígitos: <strong style="font-size:1.6em;">${code.match(/.{1,4}/g).join('-')}</strong></p>
              <p style="color:green;">✔️ Ingresa este código en WhatsApp (Dispositivos vinculados)</p>
            `;
          }
        } else {
          statusEl.textContent = '🔴 Desconectado';
          document.getElementById('requestPairingBtn').style.display = 'inline-block';
          document.getElementById('qrContainer').innerHTML = '<p>No hay QR disponible. Usa el botón "Solicitar código de vinculación".</p>';
        }
      } catch (e) {
        showError('Error al cargar estado: ' + e.message);
      }
    }

    async function requestPairingCode() {
      try {
        const btn = document.getElementById('requestPairingBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Solicitando...';
        
        const res = await apiCall('/request-pairing-code', 'POST');
        const data = await res.json();
        manualPairingCode = data.code;
        
        btn.textContent = '✅ Código solicitado';
        setTimeout(() => {
          btn.textContent = '📱 Solicitar código de vinculación';
          btn.disabled = false;
        }, 3000);
        
        document.getElementById('codeContainer').innerHTML = `
          <p>🔢 Código de 8 dígitos: <strong style="font-size:1.6em;">${data.code.match(/.{1,4}/g).join('-')}</strong></p>
          <p style="color:green;">✔️ Ya puedes ingresarlo en WhatsApp (Dispositivos vinculados > Vincular un dispositivo)</p>
        `;
        document.getElementById('qrContainer').innerHTML = '';
        document.getElementById('statusText').textContent = '🟡 Esperando vinculación...';
      } catch (e) {
        showError('Error al solicitar código: ' + e.message);
        document.getElementById('requestPairingBtn').disabled = false;
        document.getElementById('requestPairingBtn').textContent = '📱 Solicitar código de vinculación';
      }
    }

    async function restartBot() {
      if (!confirm('¿Reiniciar conexión?')) return;
      try {
        await apiCall('/restart', 'POST');
        alert('Reiniciando...');
        setTimeout(loadStatus, 5000);
      } catch (e) {
        showError(e.message);
      }
    }

    async function clearSession() {
      if (!confirm('¿Eliminar la sesión de WhatsApp por completo? Deberás volver a vincular.')) return;
      try {
        await apiCall('/clear-session', 'POST');
        manualPairingCode = null;
        alert('Sesión eliminada. La página se recargará.');
        location.reload();
      } catch (e) {
        showError(e.message);
      }
    }

    async function loadSettings() {
      const res = await apiCall('/settings');
      const data = await res.json();
      const ar = data.autoReply || {};
      document.getElementById('autoReplyActive').checked = ar.active || false;
      document.getElementById('autoReplyText').value = ar.text || '';
      document.getElementById('startHour').value = ar.startHour ?? 23;
      document.getElementById('endHour').value = ar.endHour ?? 8;
      if (ar.mediaUrl) {
        document.getElementById('autoReplyPreview').src = ar.mediaUrl;
        document.getElementById('autoReplyPreview').style.display = 'block';
      }
    }

    async function saveAutoReply() {
      try {
        const current = await (await apiCall('/settings')).json();
        let mediaUrl = current.autoReply?.mediaUrl;
        const imageFile = document.getElementById('autoReplyImage').files[0];
        if (imageFile) mediaUrl = await uploadImage(imageFile);
        
        const settings = {
          autoReply: {
            active: document.getElementById('autoReplyActive').checked,
            text: document.getElementById('autoReplyText').value,
            startHour: parseInt(document.getElementById('startHour').value),
            endHour: parseInt(document.getElementById('endHour').value),
            mediaUrl
          },
          tasks: current.tasks || [],
          statusTasks: current.statusTasks || []
        };
        await apiCall('/settings', 'POST', settings);
        alert('Configuración guardada');
      } catch (e) {
        showError(e.message);
      }
    }

    function previewAutoReplyImage() {
      const file = document.getElementById('autoReplyImage').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById('autoReplyPreview').src = e.target.result;
          document.getElementById('autoReplyPreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    async function loadGroupsList() {
      try {
        const res = await apiCall('/groups');
        groupsCache = await res.json();
        const html = groupsCache.map(g => `<p><strong>${g.name}</strong> (${g.id})</p>`).join('');
        document.getElementById('groupsList').innerHTML = html || '<p>No se encontraron grupos</p>';
      } catch (e) {
        showError(e.message);
      }
    }

    async function populateGroupSelect() {
      if (groupsCache.length === 0) {
        try {
          const res = await apiCall('/groups');
          groupsCache = await res.json();
        } catch (e) {
          return;
        }
      }
      const select = document.getElementById('taskGroupSelect');
      select.innerHTML = groupsCache.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    }

    async function loadTasks() {
      const res = await apiCall('/tasks');
      const tasks = await res.json();
      renderTasksTable(tasks, 'tasks');
    }

    async function loadStatusTasks() {
      const res = await apiCall('/status-tasks');
      const tasks = await res.json();
      renderTasksTable(tasks, 'status');
    }

    function renderTasksTable(tasks, type) {
      const tbody = document.querySelector(`#${type === 'tasks' ? 'tasksTable' : 'statusTasksTable'} tbody`);
      tbody.innerHTML = '';
      tasks.forEach(task => {
        const tr = document.createElement('tr');
        const schedule = task.scheduleType === 'cron' 
          ? `${task.cronExpression || '0 0 * * *'}`
          : `Cada ${task.intervalMinutes} min`;
        tr.innerHTML = `
          <td>${task.name || 'Sin nombre'}</td>
          <td>${type === 'tasks' ? (task.target.includes('@g.us') ? 'Grupo' : 'Privado') : 'Estado'}</td>
          <td>${task.mediaUrl ? '📷 Imagen' : '📝 Texto'}</td>
          <td>${schedule}</td>
          <td>${task.active ? '✅' : '❌'}</td>
          <td>
            <button class="test-btn" data-id="${task.id}" data-type="${type}">🧪 Probar</button>
            <button class="edit-btn" data-id="${task.id}" data-type="${type}">✏️</button>
            <button class="delete-btn" data-id="${task.id}" data-type="${type}">🗑️</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
      
      document.querySelectorAll('.test-btn').forEach(b => b.addEventListener('click', testTask));
      document.querySelectorAll('.edit-btn').forEach(b => b.addEventListener('click', editTask));
      document.querySelectorAll('.delete-btn').forEach(b => b.addEventListener('click', deleteTask));
    }

    function openTaskModal(type = 'task', task = null) {
      document.getElementById('modalTitle').textContent = task ? 'Editar' : 'Nueva ' + (type === 'task' ? 'Tarea' : 'Estado');
      document.getElementById('taskType').value = type;
      document.getElementById('taskId').value = task?.id || '';
      
      const targetSection = document.getElementById('targetSection');
      targetSection.style.display = type === 'task' ? 'block' : 'none';
      
      if (task) {
        document.getElementById('taskName').value = task.name || '';
        document.getElementById('taskMessage').value = task.message || '';
        if (task.mediaUrl) {
          document.getElementById('taskImagePreview').src = task.mediaUrl;
          document.getElementById('taskImagePreview').style.display = 'block';
        }
        document.getElementById('taskScheduleType').value = task.scheduleType || 'cron';
        if (task.scheduleType === 'cron') {
          const [min, hour] = (task.cronExpression || '0 0').split(' ');
          document.getElementById('taskHour').value = hour || 0;
          document.getElementById('taskMinute').value = min || 0;
        } else {
          document.getElementById('taskInterval').value = task.intervalMinutes || 60;
        }
        document.getElementById('taskActive').checked = task.active !== false;
        
        if (type === 'task') {
          if (task.target.includes('@g.us')) {
            document.getElementById('taskTargetType').value = 'group';
            document.getElementById('privateTargetDiv').style.display = 'none';
            document.getElementById('groupTargetDiv').style.display = 'block';
            populateGroupSelect().then(() => {
              document.getElementById('taskGroupSelect').value = task.target;
            });
          } else {
            document.getElementById('taskTargetType').value = 'private';
            document.getElementById('taskPrivateNumber').value = task.target.replace('@s.whatsapp.net', '');
          }
        }
      } else {
        document.getElementById('taskForm').reset();
        document.getElementById('taskImagePreview').style.display = 'none';
        document.getElementById('taskScheduleType').value = 'cron';
        document.getElementById('taskActive').checked = true;
        if (type === 'task') {
          document.getElementById('taskTargetType').value = 'private';
          toggleTargetType();
        }
      }
      toggleScheduleType();
      document.getElementById('taskModal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('taskModal').style.display = 'none';
    }

    function toggleTargetType() {
      const type = document.getElementById('taskTargetType').value;
      document.getElementById('privateTargetDiv').style.display = type === 'private' ? 'block' : 'none';
      document.getElementById('groupTargetDiv').style.display = type === 'group' ? 'block' : 'none';
      if (type === 'group') populateGroupSelect();
    }

    function toggleScheduleType() {
      const type = document.getElementById('taskScheduleType').value;
      document.getElementById('cronDiv').style.display = type === 'cron' ? 'block' : 'none';
      document.getElementById('intervalDiv').style.display = type === 'interval' ? 'block' : 'none';
    }

    function previewTaskImage() {
      const file = document.getElementById('taskImage').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          document.getElementById('taskImagePreview').src = e.target.result;
          document.getElementById('taskImagePreview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    }

    async function saveTask(e) {
      e.preventDefault();
      const type = document.getElementById('taskType').value;
      const id = document.getElementById('taskId').value;
      const name = document.getElementById('taskName').value;
      const message = document.getElementById('taskMessage').value;
      const scheduleType = document.getElementById('taskScheduleType').value;
      const active = document.getElementById('taskActive').checked;
      
      let target;
      if (type === 'task') {
        const targetType = document.getElementById('taskTargetType').value;
        target = targetType === 'private' 
          ? document.getElementById('taskPrivateNumber').value + '@s.whatsapp.net'
          : document.getElementById('taskGroupSelect').value;
      } else {
        target = 'status@broadcast';
      }
      
      let cronExpression = null, intervalMinutes = null;
      if (scheduleType === 'cron') {
        const hour = document.getElementById('taskHour').value.padStart(2, '0');
        const minute = document.getElementById('taskMinute').value.padStart(2, '0');
        cronExpression = `${minute} ${hour} * * *`;
      } else {
        intervalMinutes = parseInt(document.getElementById('taskInterval').value);
      }
      
      let mediaUrl = document.getElementById('taskImagePreview').style.display === 'block' 
        ? document.getElementById('taskImagePreview').src : null;
      const imageFile = document.getElementById('taskImage').files[0];
      if (imageFile) mediaUrl = await uploadImage(imageFile);
      
      const task = { id, name, target, message, mediaUrl, scheduleType, cronExpression, intervalMinutes, active };
      
      const endpoint = type === 'task' ? '/tasks' : '/status-tasks';
      await apiCall(endpoint, 'POST', { task });
      closeModal();
      if (type === 'task') loadTasks(); else loadStatusTasks();
    }

    async function editTask(e) {
      const id = e.target.dataset.id;
      const type = e.target.dataset.type;
      const endpoint = type === 'tasks' ? '/tasks' : '/status-tasks';
      const res = await apiCall(endpoint);
      const tasks = await res.json();
      const task = tasks.find(t => t.id === id);
      if (task) openTaskModal(type === 'tasks' ? 'task' : 'status', task);
    }

    async function deleteTask(e) {
      if (!confirm('¿Eliminar?')) return;
      const id = e.target.dataset.id;
      const type = e.target.dataset.type;
      const endpoint = type === 'tasks' ? '/tasks' : '/status-tasks';
      await apiCall(`${endpoint}/${id}`, 'DELETE');
      if (type === 'tasks') loadTasks(); else loadStatusTasks();
    }

    async function testTask(e) {
      const id = e.target.dataset.id;
      const type = e.target.dataset.type;
      const endpoint = type === 'tasks' ? '/tasks' : '/status-tasks';
      try {
        await apiCall(`${endpoint}/${id}/test`, 'POST');
        alert('✅ Mensaje enviado correctamente');
      } catch (error) {
        showError('Error al probar: ' + error.message);
      }
    }

    main();
  </script>
</body>
  </html>
