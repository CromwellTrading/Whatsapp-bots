<!DOCTYPE html>
<html>
<head>
  <title>Admin - WhatsApp Bot SaaS</title>
  <style>
    body { font-family: Arial; max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .connected { color: green; font-weight: bold; }
    .disconnected { color: red; }
    button { margin: 2px; padding: 5px 10px; cursor: pointer; }
    #logout { float: right; padding: 8px 16px; }
  </style>
</head>
<body>
  <button id="logout">Cerrar Sesión</button>
  <h1>🔧 Panel de Administración</h1>
  
  <h2>👥 Usuarios Registrados</h2>
  <table id="usersTable">
    <thead>
      <tr>
        <th>Teléfono</th>
        <th>Nombre</th>
        <th>Admin</th>
        <th>Aprobado</th>
        <th>Estado WhatsApp</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
    // ⚠️ REEMPLAZA CON TUS DATOS REALES DE SUPABASE
    const SUPABASE_URL = 'https://udvmarwjzvexzcumygmc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkdm1hcndqenZleHpjdW15Z21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyNjUyMDUsImV4cCI6MjA5MDg0MTIwNX0.3z-HNWHkdBXsE3nltNn4iEwZGwQYBB5Fk3M4JkcUFxs';
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let token = localStorage.getItem('sb-token');
    if (!token) window.location.href = '/login.html';
    supabase.auth.setSession({ access_token: token, refresh_token: '' });
    
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) { logout(); }
    
    const { data: profile } = await supabase.from('profiles').select('is_admin').eq('id', user.id).single();
    if (!profile?.is_admin) window.location.href = '/user.html';
    
    async function apiCall(endpoint, method='GET', body=null) {
      const res = await fetch(`/api/admin${endpoint}`, {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: body ? JSON.stringify(body) : null
      });
      return res;
    }
    
    async function loadUsers() {
      const res = await apiCall('/users');
      const users = await res.json();
      const tbody = document.querySelector('#usersTable tbody');
      tbody.innerHTML = '';
      users.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${u.phone_number}</td>
          <td>${u.full_name || '-'}</td>
          <td>${u.is_admin ? '✅ Sí' : '❌ No'}</td>
          <td>${u.is_approved ? '✅ Aprobado' : '⏳ Pendiente'}</td>
          <td class="${u.connected ? 'connected' : 'disconnected'}">
            ${u.connected ? '🟢 Conectado' : (u.hasQR ? '🟡 Esperando QR' : '🔴 Desconectado')}
          </td>
          <td>
            ${!u.is_approved ? `<button onclick="approveUser('${u.id}')">✅ Aprobar</button>` : ''}
            <button onclick="restartUser('${u.id}')">🔄 Reiniciar</button>
            <button onclick="deleteUser('${u.id}')">🗑️ Eliminar</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }
    
    window.approveUser = async (userId) => {
      if (!confirm('¿Aprobar este usuario? Se iniciará su instancia de WhatsApp.')) return;
      await apiCall(`/users/${userId}/approve`, 'POST');
      loadUsers();
    };
    
    window.restartUser = async (userId) => {
      if (!confirm('¿Reiniciar la instancia de WhatsApp de este usuario?')) return;
      await apiCall(`/users/${userId}/restart`, 'POST');
      loadUsers();
    };
    
    window.deleteUser = async (userId) => {
      if (!confirm('¿Eliminar usuario permanentemente? Esta acción no se puede deshacer.')) return;
      await apiCall(`/users/${userId}`, 'DELETE');
      loadUsers();
    };
    
    function logout() {
      localStorage.removeItem('sb-token');
      window.location.href = '/login.html';
    }
    
    document.getElementById('logout').onclick = logout;
    
    loadUsers();
    setInterval(loadUsers, 30000); // Actualizar cada 30 segundos
  </script>
</body>
</html>
