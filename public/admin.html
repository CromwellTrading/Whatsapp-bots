<!DOCTYPE html>
<html>
<head>
  <title>Admin - WhatsApp Bot SaaS</title>
  <style>
    body { font-family: Arial; max-width: 1200px; margin: 20px auto; padding: 0 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
    .connected { color: green; }
    .disconnected { color: red; }
    button { margin: 2px; padding: 5px 10px; cursor: pointer; }
    #logout { float: right; padding: 8px 16px; }
    .error { color: red; background: #f8d7da; padding: 10px; }
  </style>
</head>
<body>
  <button id="logout">Cerrar Sesión</button>
  <h1>🔧 Panel de Administración</h1>
  <p><a href="/user.html">📱 Ir a mi panel de usuario</a></p>
  
  <div id="errorMessage" class="error" style="display:none;"></div>
  
  <h2>👥 Usuarios Registrados</h2>
  <table id="usersTable">
    <thead>
      <tr>
        <th>Teléfono</th>
        <th>Nombre</th>
        <th>Admin</th>
        <th>Aprobado</th>
        <th>Estado WhatsApp</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script src="/config.js"></script>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    
    function showError(msg) {
      const el = document.getElementById('errorMessage');
      el.textContent = '❌ ' + msg;
      el.style.display = 'block';
    }
    
    try {
      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
        throw new Error('Configuración de Supabase no cargada');
      }
      
      const supabase = createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      
      let token = localStorage.getItem('sb-token');
      if (!token) {
        window.location.href = '/login.html';
        throw new Error('Redirigiendo...');
      }
      
      supabase.auth.setSession({ access_token: token, refresh_token: '' });
      
      const { data: { user }, error: userError } = await supabase.auth.getUser();
      if (userError || !user) {
        localStorage.removeItem('sb-token');
        window.location.href = '/login.html';
        throw new Error('Sesión inválida');
      }
      
      const { data: profile } = await supabase
        .from('profiles')
        .select('is_admin')
        .eq('id', user.id)
        .single();
      
      if (!profile?.is_admin) {
        window.location.href = '/user.html';
        throw new Error('Acceso denegado');
      }
      
      async function apiCall(endpoint, method='GET', body=null) {
        const res = await fetch(`/api/admin${endpoint}`, {
          method,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: body ? JSON.stringify(body) : null
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error || 'Error en la solicitud');
        }
        return res;
      }
      
      async function loadUsers() {
        try {
          const res = await apiCall('/users');
          const users = await res.json();
          const tbody = document.querySelector('#usersTable tbody');
          tbody.innerHTML = '';
          users.forEach(u => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${u.phone_number}</td>
              <td>${u.full_name || '-'}</td>
              <td>${u.is_admin ? '✅ Sí' : '❌ No'}</td>
              <td>${u.is_approved ? '✅ Aprobado' : '⏳ Pendiente'}</td>
              <td class="${u.connected ? 'connected' : 'disconnected'}">
                ${u.connected ? '🟢 Conectado' : (u.hasQR ? '🟡 Esperando QR' : '🔴 Desconectado')}
              </td>
              <td>
                ${!u.is_approved ? `<button class="approveBtn" data-id="${u.id}">✅ Aprobar</button>` : ''}
                <button class="restartBtn" data-id="${u.id}">🔄 Reiniciar</button>
                <button class="deleteBtn" data-id="${u.id}">🗑️ Eliminar</button>
              </td>
            `;
            tbody.appendChild(tr);
          });
          
          // Event listeners
          document.querySelectorAll('.approveBtn').forEach(btn => {
            btn.onclick = () => approveUser(btn.dataset.id);
          });
          document.querySelectorAll('.restartBtn').forEach(btn => {
            btn.onclick = () => restartUser(btn.dataset.id);
          });
          document.querySelectorAll('.deleteBtn').forEach(btn => {
            btn.onclick = () => deleteUser(btn.dataset.id);
          });
        } catch (e) {
          showError('Error al cargar usuarios: ' + e.message);
        }
      }
      
      async function approveUser(userId) {
        if (!confirm('¿Aprobar este usuario?')) return;
        try {
          await apiCall(`/users/${userId}/approve`, 'POST');
          loadUsers();
        } catch (e) {
          showError('Error: ' + e.message);
        }
      }
      
      async function restartUser(userId) {
        if (!confirm('¿Reiniciar instancia?')) return;
        try {
          await apiCall(`/users/${userId}/restart`, 'POST');
          loadUsers();
        } catch (e) {
          showError('Error: ' + e.message);
        }
      }
      
      async function deleteUser(userId) {
        if (!confirm('¿Eliminar usuario permanentemente?')) return;
        try {
          await apiCall(`/users/${userId}`, 'DELETE');
          loadUsers();
        } catch (e) {
          showError('Error: ' + e.message);
        }
      }
      
      function logout() {
        localStorage.removeItem('sb-token');
        window.location.href = '/login.html';
      }
      
      document.getElementById('logout').onclick = logout;
      
      loadUsers();
      setInterval(loadUsers, 30000);
      
    } catch (error) {
      document.body.innerHTML = `<div class="error">Error crítico: ${error.message}</div>`;
      console.error(error);
    }
  </script>
</body>
</html>
